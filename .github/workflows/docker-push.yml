name: Docker Image Sync (Multi-Arch)

on:
  workflow_dispatch:
    inputs:
      source_image:
        description: '源镜像 (例: ghcr.io/***/***:latest)'
        required: true
        default: ''
      target_repo:
        description: 'Docker Hub 仓库名 (不含用户名)'
        required: true
        default: ''
      target_tag:
        description: '镜像标签'
        required: true
        default: 'latest'

jobs:
  sync_image:
    runs-on: ubuntu-latest
    steps:
      # 1. 设置 Crane 工具
      - name: Setup Crane
        uses: imjasonh/setup-crane@v0.3

      # 2. 显式登录双方仓库 (这是保证镜像不损坏的关键)
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | crane auth login index.docker.io -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # 3. 使用 crane cp 进行原生迁移
      - name: Sync Image
        run: |
          SOURCE="${{ github.event.inputs.source_image }}"
          TARGET="${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.inputs.target_repo }}:${{ github.event.inputs.target_tag }}"
          
          echo "🚀 正在从 $SOURCE 同步到 $TARGET ..."
          crane cp "$SOURCE" "$TARGET"
